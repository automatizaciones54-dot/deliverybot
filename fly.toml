app = "deliverybot-curious-meadowlark-9263"
primary_region = "gru"
kill_signal = "SIGINT"
kill_timeout = 5

[env]
  PORT = "8080"
  DB_PATH = "/data/database.json"
  LOCAL_AUTH_PATH = "/data/.wwebjs_auth"
  NODE_OPTIONS = "--max-old-space-size=150"

[[services]]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[mounts]]
  source = "deliverybot_data"
  destination = "/data"
