app = "deliverybot-curious-meadowlark-9263"
primary_region = "gru"

[env]
  PORT = "8080"
  DB_PATH = "/data/database.json"
  AUTH_PATH = "/data/.wwebjs_auth"

[[services]]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[[mounts]]
  source = "deliverybot_data"
  destination = "/data"
